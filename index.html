<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshots of Lukas</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 4rem 2rem 1rem;
        }

        /* Cool animated glowing title */
        h1 {
            font-size: 3.5rem;
            margin: 0 0 1rem 0;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradient-shift 5s ease infinite;
            background-size: 200% 200%;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        /* Image Gallery Grid */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(750px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 120000px;
            padding: 0 2rem 4rem;
            box-sizing: border-box;
        }

        .gallery-item {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #1e293b;
            aspect-ratio: 16 / 9;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

    </style>
</head>
<body>

    <header>
        <h1>Screenshots of Lukas</h1>
        <p>The racism collection.</p>
    </header>

    <div id="gallery">
        <!-- IMAGE 1 -->
        <div class="gallery-item">
            <img src="mythicrarity.png" alt="Screenshot of Lukas">
        </div>
        
        <!-- IMAGE 2 -->
        <div class="gallery-item">
            <img src="SFN.png" alt="Screenshot of Lukas">
        </div>

        <!-- IMAGE 3 -->
        <div class="gallery-item">
            <img src="SMB.png" alt="Screenshot of Lukas">
        </div>
        
    </div>

</body>
</html>
